# FreeSWITCH ローカル開発用 docker-compose
#
# 起動方法:
#   1. infra/.env を作成 (infra/.env.example をコピーして値を設定)
#   2. ビルド & 起動:
#      cd infra/freeswitch && docker compose up -d --build
#
# ESL接続確認:
#   docker exec -it freeswitch fs_cli -x "status"

services:
  freeswitch:
    build:
      context: .
    container_name: freeswitch
    network_mode: host
    env_file:
      - ../.env
    volumes:
      # テンプレートXML (entrypoint.sh が envsubst で実設定に変換)
      - ./conf/autoload_configs/event_socket.conf.xml:/etc/freeswitch/templates/autoload_configs/event_socket.conf.xml:ro
      - ./conf/sip_profiles/external.xml:/etc/freeswitch/templates/sip_profiles/external.xml:ro
      - ./conf/directory/default/agent_template.xml:/etc/freeswitch/templates/directory/default/agent_template.xml:ro
      # envsubst 不要の設定ファイル (直接マウント)
      - ./conf/sip_profiles/internal.xml:/etc/freeswitch/sip_profiles/internal.xml:ro
      - ./conf/dialplan/default.xml:/etc/freeswitch/dialplan/default.xml:ro
      - ./conf/dialplan/public.xml:/etc/freeswitch/dialplan/public.xml:ro
      # 録音データの永続化
      - freeswitch-recordings:/var/lib/freeswitch/recordings
    restart: unless-stopped

volumes:
  freeswitch-recordings:
