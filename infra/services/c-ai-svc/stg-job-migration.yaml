# infra/services/c-ai-svc/stg-job-migration.yaml
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: c-ai-svc-migrate-stg
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: "doppel-stg:asia-northeast1:doppel-stg-mysql-primary"
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/network-interfaces: '[{"network":"projects/mitra-shared-network/global/networks/mitra-vpc-main-shared","subnetwork":"projects/mitra-shared-network/regions/asia-northeast1/subnetworks/mitra-subnet-stg-tokyo-doppel-domain"}]'
    spec:
      taskCount: 1
      template:
        spec:
          serviceAccountName: cd-exec@doppel-stg.iam.gserviceaccount.com
          timeoutSeconds: 300
          maxRetries: 1
          containers:
            - name: c-ai-svc
              image: c-ai-svc
              command: ["uv"]
              args: ["run", "alembic", "upgrade", "head"]
              env:
                - name: ENV
                  value: "stg"