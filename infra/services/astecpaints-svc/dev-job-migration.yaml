# infra/services/astecpaints-svc/dev-job-migration.yaml
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: astecpaints-svc-migrate-dev
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/cloudsql-instances: "doppel-dev-461016:asia-northeast1:doppel-dev-mysql-primary"
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/network-interfaces: '[{"network":"projects/mitra-shared-network/global/networks/mitra-vpc-main-shared","subnetwork":"projects/mitra-shared-network/regions/asia-northeast1/subnetworks/mitra-subnet-dev-tokyo-doppel-domain"}]'
    spec:
      taskCount: 1
      template:
        spec:
          serviceAccountName: cd-exec@doppel-dev-461016.iam.gserviceaccount.com
          timeoutSeconds: 300
          maxRetries: 1
          containers:
            - name: astecpaints-svc
              image: astecpaints-svc
              command: ["uv"]
              args: ["run", "alembic", "upgrade", "head"]
              resources:
                limits:
                  memory: "2Gi"
              env:
                - name: ENV
                  value: "dev"
                - name: TENANT_ID
                  value: "astecpaints-j3d6p"
                - name: TENANT_NAME
                  value: "astecpaints"
                - name: ALLOW_ORIGINS
                  value: '["https://astecpaints-app-1090554569112.asia-northeast1.run.app"]'