# infra/services/doshisha-svc/prod-cloudrun.yaml
apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: doshisha-svc
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "20"
        autoscaling.knative.dev/target: "75"
        run.googleapis.com/startup-cpu-boost: "true"
        run.googleapis.com/cloudsql-instances: "doppel-prod:asia-northeast1:doppel-prod-mysql-primary"
        run.googleapis.com/vpc-access-egress: private-ranges-only
        run.googleapis.com/network-interfaces: '[{"network":"projects/mitra-shared-network/global/networks/mitra-vpc-main-shared","subnetwork":"projects/mitra-shared-network/regions/asia-northeast1/subnetworks/mitra-subnet-prod-tokyo-doppel-domain"}]'
    spec:
      serviceAccountName: cd-exec@doppel-prod.iam.gserviceaccount.com
      containerConcurrency: 80
      timeoutSeconds: 600
      containers:
        - image: doshisha-svc
          ports:
            - containerPort: 8080
              name: http1
          resources:
            limits:
              cpu: "2000m"
              memory: "2Gi"
          env:
            - name: ENV
              value: "prod"
            - name: TENANT_ID
              value: "doshisha-6kb1w"
            - name: TENANT_NAME
              value: "doshisha"
            - name: ALLOW_ORIGINS
              value: '["https://doshisha-app-646682719623.asia-northeast1.run.app"]'
  traffic:
    - percent: 100