# infra/apps/based-template-app/stg-job-migration.yaml
apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: based-template-app-migrate-stg
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/vpc-access-egress: all-traffic
        run.googleapis.com/network-interfaces: '[{"network":"projects/mitra-shared-network/global/networks/mitra-vpc-main-shared","subnetwork":"projects/mitra-shared-network/regions/asia-northeast1/subnetworks/mitra-subnet-stg-tokyo-doppel-frontend"}]'
    spec:
      taskCount: 1
      template:
        spec:
          serviceAccountName: cd-exec@doppel-stg.iam.gserviceaccount.com
          timeoutSeconds: 300
          maxRetries: 1
          containers:
            - name: based-template-app
              image: based-template-app
              command: ["uv"]
              args: ["run", "alembic", "upgrade", "head"]