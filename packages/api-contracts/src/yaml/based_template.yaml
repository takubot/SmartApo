          type: number
          title: Avgcalldurationseconds
        totalTalkTimeSeconds:
          type: integer
          title: Totaltalktimeseconds
      additionalProperties: false
      type: object
      required:
      - agentId
      - displayName
      - totalCalls
      - totalAnswered
      - answerRate
      - avgCallDurationSeconds
      - totalTalkTimeSeconds
